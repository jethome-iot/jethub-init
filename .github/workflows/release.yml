name: Release init script packages

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set version
        run: |
          v="${GITHUB_REF_NAME#v}"
          echo "VERSION=${v//-/\~}" >> "$GITHUB_ENV"

      - name: Render per-board nfpm configs
        run: for b in j80 j100 j200; do sed "s/@BOARD@/$b/g" .github/nfpm.yaml > "nfpm-$b.yaml"; done

      - name: Build armbian .deb (j80)
        uses: secondlife/action-nfpm@v2
        with:
          checkout: false
          packager: deb
          config: nfpm-j80.yaml
          target: build/j80

      - name: Build armbian .deb (j100)
        uses: secondlife/action-nfpm@v2
        with:
          checkout: false
          packager: deb
          config: nfpm-j100.yaml
          target: build/j100

      - name: Build armbian .deb (j200)
        uses: secondlife/action-nfpm@v2
        with:
          checkout: false
          packager: deb
          config: nfpm-j200.yaml
          target: build/j200

      - name: Assemble release assets
        run: |
          mkdir -p dist
          for b in j80 j100 j200; do
            mv "build/$b"/*.deb "dist/jethub-init-${b}_${VERSION}.deb"
          done
          tar -czf "dist/jethub-init-haos_${VERSION}.tar.gz" haos-ash

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/jethub-init-j80_${VERSION}.deb \
            dist/jethub-init-j100_${VERSION}.deb \
            dist/jethub-init-j200_${VERSION}.deb \
            dist/jethub-init-haos_${VERSION}.tar.gz \
            --title "$GITHUB_REF_NAME" \
            --generate-notes

      - name: Cleanup workspace
        if: always()
        run: rm -rf dist build nfpm-*.yaml
